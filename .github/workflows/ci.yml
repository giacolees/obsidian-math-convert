name: CI

on:
  push:
    branches: ["**"]
    tags-ignore: ["**"]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Type-check
        run: npx tsc --noEmit --skipLibCheck

      - name: Build
        run: node esbuild.config.mjs production

      - name: Verify ONNX patch was applied
        run: grep -q 'if (Aa)' main.js || (echo "::error::ONNX inline-WASM patch not found in main.js — esbuild post-patch failed" && exit 1)

      - uses: actions/upload-artifact@v4
        with:
          name: plugin-build
          path: |
            main.js
            manifest.json
            styles.css
          retention-days: 7
