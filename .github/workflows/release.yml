name: Release

on:
  push:
    tags:
      - "[0-9]+.[0-9]+.[0-9]+"
      - "v[0-9]+.[0-9]+.[0-9]+"

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
      attestations: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - run: npm ci

      - name: Type-check
        run: npx tsc --noEmit --skipLibCheck

      - name: Build production
        run: node esbuild.config.mjs production

      - name: Verify ONNX patch was applied
        run: grep -q 'if (Aa)' main.js || (echo "::error::ONNX inline-WASM patch not found in main.js — esbuild post-patch failed" && exit 1)

      - name: Verify manifest version matches tag
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          MANIFEST_VERSION=$(node -p "require('./manifest.json').version")
          if [ "$TAG" != "$MANIFEST_VERSION" ]; then
            echo "::error::Tag ($GITHUB_REF_NAME) does not match manifest.json version ($MANIFEST_VERSION)"
            exit 1
          fi

      - name: Attest main.js
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: main.js

      - name: Attest styles.css
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: styles.css

      - name: Build release notes
        id: release_notes
        uses: mikepenz/release-changelog-builder-action@v5
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          mode: "COMMIT"
          configurationJson: |
            {
              "label_extractor": [{
                "pattern": "^(\\w+)(\\([\\w\\-\\.]+\\))?(!)?: .+",
                "on_property": "title",
                "target": "$1"
              }],
              "categories": [
                { "title": "## Features", "labels": ["feat"] },
                { "title": "## Fixes", "labels": ["fix"] },
                { "title": "## Refactors", "labels": ["refactor"] },
                { "title": "## Other", "labels": [] }
              ],
              "ignore_labels": ["release", "bump"]
            }

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          body: ${{ steps.release_notes.outputs.changelog }}
          files: |
            main.js
            manifest.json
            styles.css
